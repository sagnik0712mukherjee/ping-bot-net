name: 🎵 Pritam News Alerts Bot

on:
  schedule:
    - cron: '0 * * * *'   # every hour on the dot
  workflow_dispatch:       # manual trigger from Actions tab

# Allow the workflow to push seen_urls.json back to the repo
permissions:
  contents: write

jobs:
  monitor:
    name: Fetch & Send Pritam News
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout (full history so we can push back)
      - name: ✅ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Setup Python
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install dependencies
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run the bot
      - name: 🚀 Run Pritam News Alerts Bot
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          NEWSAPI_KEY:       ${{ secrets.NEWSAPI_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "⏱️ Starting Pritam News Alerts Bot at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          python3 main.py 2>&1 | tee monitor_log.txt
          echo "✅ Pritam News Alerts Bot completed at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      # 5. ── KEY FIX: commit seen_urls.json back to repo ──────────────────────
      # Without this, every run starts from a blank dedup state and resends
      # all articles from the lookback window → duplicate emails.
      - name: 💾 Persist seen_urls.json to repo
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_urls.json || true
          git diff --cached --quiet || git commit -m "chore: update seen_urls.json [skip ci]"
          git push || true

      # 6. Upload logs as artifact
      - name: 📋 Save logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-run-${{ github.run_number }}
          path: monitor_log.txt
          retention-days: 30