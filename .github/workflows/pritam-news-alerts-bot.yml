name: 🎵 Pritam News Alerts Bot

on:
  schedule:
    # Run every 1 hour (as per RUN_EVERY_N_HOURS in settings)
    - cron: '0 * * * *'
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  monitor:
    name: Fetch & Send Pritam News
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout code
      - name: ✅ Checkout code
        uses: actions/checkout@v4
      
      # 2. Setup Python
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # 3. Install dependencies
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 4. Run the bot
      - name: 🚀 Run Pritam News Alerts Bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          echo "⏱️ Starting Pritam News Alerts Bot at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          python3 main.py 2>&1 | tee monitor_log.txt
          echo "✅ Pritam News Alerts Bot completed at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
      
      # 5. Upload logs as artifact
      - name: 📋 Save logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-run-${{ github.run_number }}
          path: monitor_log.txt
          retention-days: 30
